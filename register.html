<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HEV | إنشاء حساب جديد</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container { max-width: 400px; margin: 150px auto; padding: 40px; border: 1px solid #eee; text-align: center; }
        .login-container input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; }
        .btn-login { width: 100%; padding: 15px; background: linear-gradient(45deg, #000, #333); color: #fff; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login:hover { background: #e50000; }
        .switch-page { margin-top: 20px; font-size: 0.9rem; }
        .switch-page a { color: #e50000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>إنشاء حساب جديد</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-login">تسجيل حساب</button>
        </form>
        <div class="switch-page">
            لديك حساب بالفعل؟ <a href="login.html">سجل دخولك هنا</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // إرسال البيانات الجديدة للسيرفر
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, password })
            });

            const result = await response.json();
            alert(result.message);

            if(result.success) {
                window.location.href = 'login.html'; // تحويله لتسجيل الدخول بعد نجاح إنشاء الحساب
            }
        };
    </script>
</body>
</html>
